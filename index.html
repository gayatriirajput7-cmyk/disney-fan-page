<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Webpage</title>
    <link rel="stylesheet" href="Index.css">
    <style>
        body {
            background: linear-gradient(to right, black, rgb(1, 1, 73), rgb(167, 5, 192), black);
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }

        h1 {
            transition: all 1s ease-in-out;
            color: silver;
            text-align: center;
            font-size: 100px;
            margin: 10px;
            font-family: cursive;
        }

        body:hover h1 {
            font-size: 120px; /* Reduced slightly for better layout balance */
        }

        .Large {
            transition: all 1s ease-in-out;
            width: 70%;
            margin: 0 auto 30px auto;
            display: block;
            height: 500px;
            object-fit: cover;
            border: 2px rgb(75, 75, 75) solid;
            border-radius: 30px; /* Replaced extreme 500px capsule with a smooth pill shape */
        }

        body:hover .Large {
            width: 90%;
        }

        .Main, .Main1 {
            width: 90%;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-evenly;
            gap: 20px;
            flex-wrap: wrap; /* Prevents text overflow on small viewports */
        }

        .Small {
            transition: all 0.5s ease-in-out;
            background-color: silver;
            width: 300px;
            text-align: center;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .Small img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-bottom: 2px rgb(75, 75, 75) solid;
        }

        .Small:hover {
            transform: scale(1.08); /* Fixed horizontal distortion */
        }

        .Small1 {
            transition: all 0.5s ease-in-out;
            background-color: silver;
            width: 200px;
            text-align: center;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .Small1 img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-bottom: 2px rgb(75, 75, 75) solid;
        }

        .Small1:hover {
            transform: scale(1.08); 
        }

        h2 {
            font-size: 22px;
            color: #222;
            margin: 12px 0;
        }

        h3 {
            font-size: 24px;
            color: silver;
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>

<body>
